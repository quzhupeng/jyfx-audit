department: "美业事业部"
description: "面向美容、医美、轻医美等领域的产品销售与服务运营"
business_thread: "直营店运营（引流-转化-客单价）→ 招商加盟（拓店-赋能-业绩）→ 供应链与产品支持（库存-新品）"

focus_areas:
  - area: "直营运营"
    weight: 1.5
    kpis:
      - name: "单店坪效"
        direction: "higher_better"
        description: "直营店单位面积的产出"
      - name: "核销率（线上/线下）"
        direction: "higher_better"
        description: "引流到核销的转化率"
      - name: "客单价"
        direction: "higher_better"
        description: "平均客单消费金额"
  - area: "招商加盟"
    weight: 1.3
    kpis:
      - name: "新增有效店铺数"
        direction: "higher_better"
        description: "新拓有效合作店铺数量"
      - name: "加盟店业绩达成"
        direction: "higher_better"
        description: "加盟店销售业绩"
  - area: "供应链与运营健康"
    weight: 1.2
    kpis:
      - name: "整体利润"
        direction: "higher_better"
        description: "事业部整体利润水平"
      - name: "库存周转周期"
        direction: "lower_better"
        description: "库存从入库到售出的平均周期"

risk_factors:
  - name: "核销率持续走低"
    severity: "high"
    threshold: "核销率环比下降"
  - name: "拓店停滞"
    severity: "high"
    threshold: "连续2月无新增有效店铺"
  - name: "库存积压"
    severity: "medium"
    threshold: "库存周转周期持续拉长"

analysis_prompt_extension: |
  美业事业部核心业务是直营店运营和招商加盟双轮驱动。审核经营分析资料时需特别关注：
  1. **直营店链路**：引流获客→到店核销→升单转化→长期客户沉淀，全链路数据是否完整
  2. **招商加盟**：拓店数量、赋能效果、加盟店业绩表现
  3. **运营健康度**：核销率、坪效、库存周转是否在健康区间
  4. **BSC覆盖**：直营盈利能力、招商增长效率及运营健康度是否全面覆盖
  5. **费用与利润**：整体利润变化及费用结构分析

  常见质量问题：
  - 只有总销售额，缺乏引流-核销-升单的链路数据
  - 未分析加盟店与直营店的分层差异
  - 库存和供应链问题缺乏具体改善措施
