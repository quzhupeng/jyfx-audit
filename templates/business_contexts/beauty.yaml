department: "美业事业部"
description: "面向美容、医美、轻医美等领域的产品销售与服务运营"
business_thread: "门店开发→培训赋能→产品供应→活动策划→客情维护→业绩跟踪→复购升级"

focus_areas:
  - area: "门店运营"
    weight: 1.5
    kpis:
      - name: "活跃门店数"
        direction: "higher_better"
        description: "有持续进货和销售活动的合作门店数量"
      - name: "单店平均产出"
        direction: "higher_better"
        description: "单个合作门店的平均进货额/销售额"
      - name: "门店留存率"
        direction: "higher_better"
        description: "持续合作门店占总门店的比率"
  - area: "培训与活动"
    weight: 1.2
    kpis:
      - name: "培训覆盖率"
        direction: "higher_better"
        description: "接受产品/技术培训的门店占比"
      - name: "活动转化率"
        direction: "higher_better"
        description: "线下沙龙/品鉴会等活动带来的成交转化"
  - area: "产品销售"
    weight: 1.3
    kpis:
      - name: "核心产品复购率"
        direction: "higher_better"
        description: "主力产品的门店复购率"
      - name: "新品推广达成率"
        direction: "higher_better"
        description: "新品铺货和销售目标的达成情况"

risk_factors:
  - name: "门店流失加速"
    severity: "high"
    threshold: "月流失门店数 > 新增门店数"
  - name: "单店产出下滑"
    severity: "high"
    threshold: "连续3月单店平均产出下降"
  - name: "库存积压"
    severity: "medium"
    threshold: "滞销品库存占比 > 20%"

analysis_prompt_extension: |
  美业事业部的核心业务是通过门店渠道进行产品推广和销售。审核经营分析资料时需要特别关注：
  1. **门店运营健康度**：活跃门店数变化、单店产出趋势、门店流失原因分析
  2. **培训赋能效果**：培训覆盖率和培训后业绩提升的关联性
  3. **产品动销分析**：核心产品vs新品的销售结构变化
  4. **活动ROI**：各类线下活动的投入产出比和转化效果
  5. **市场趋势**：医美/轻医美市场变化对业务的影响

  常见质量问题：
  - 只有总体销售数据，缺乏门店维度的分层分析
  - 未分析门店流失的具体原因和改善对策
  - 新品推广只有目标没有实际达成和差异分析
