department: "纪审部"
description: "负责合规风控、监督纠偏与价值增值的集团监督职能部门"
business_thread: "合规风控 → 监督纠偏 → 整改验收闭环 → 专项支撑 → 价值增值"

focus_areas:
  - area: "审计计划与执行"
    weight: 1.5
    kpis:
      - name: "年度/季度审计计划落地"
        direction: "higher_better"
        description: "按计划完成的审计项目数量"
      - name: "问题排查与风险预警"
        direction: "higher_better"
        description: "发现的问题数量和预警质量"
      - name: "整改验收闭环率"
        direction: "higher_better"
        description: "问题整改完成并验收通过的比率"
  - area: "专项支撑"
    weight: 1.3
    kpis:
      - name: "业务优化建议数量"
        direction: "higher_better"
        description: "审计发现并提出的业务优化建议数"
      - name: "风控标准落地条数"
        direction: "higher_better"
        description: "制定并落地的风控标准/制度数"
  - area: "价值创造"
    weight: 1.2
    kpis:
      - name: "降损止损金额"
        direction: "higher_better"
        description: "通过审计挽回/避免的损失金额"
      - name: "合规风险规避价值"
        direction: "higher_better"
        description: "预防性合规工作带来的风险规避价值"

risk_factors:
  - name: "审计计划严重滞后"
    severity: "high"
    threshold: "审计计划完成率 < 60%"
  - name: "整改闭环不力"
    severity: "high"
    threshold: "整改验收闭环率 < 80%"

analysis_prompt_extension: |
  纪审部以合规风控、监督纠偏、价值增值为核心主线。审核经营分析资料时需特别关注：
  1. **审计计划落地**：年度/季度计划执行情况、覆盖范围
  2. **问题排查与风险预警**：发现问题的数量、类型、严重程度，预警是否及时
  3. **整改验收闭环**：历史问题整改进度、超期未整改项、闭环率
  4. **专项支撑**：配合集团合规检查、外部审计对接、重大事项风险研判
  5. **价值增值**：降损止损金额、风控标准建设、合规风险规避

  常见质量问题：
  - 只有审计数量统计，缺乏问题类型和价值分析
  - 整改跟踪缺乏闭环数据
  - 未体现对业务优化的增值贡献
