department: "干细胞研究院"
description: "遵循全生命周期管理流程，负责种子/细胞株管理、生产与质量控制的专业研究机构"
business_thread: "种子/细胞株管理 → 生产计划与排程 → 生产过程与质量控制 → 分析检测与合规放行"

focus_areas:
  - area: "生产质量"
    weight: 1.5
    kpis:
      - name: "关键工艺成功率（一/二级罐培养）"
        direction: "higher_better"
        description: "核心培养工艺的一次成功率"
      - name: "检测一次合格率"
        direction: "higher_better"
        description: "分析检测一次合格的比率"
      - name: "生产计划达成率"
        direction: "higher_better"
        description: "按计划完成生产任务的比率"
  - area: "研发里程碑"
    weight: 1.3
    kpis:
      - name: "研发项目里程碑达成率"
        direction: "higher_better"
        description: "各研发项目关键里程碑的达成情况"
  - area: "流程控制"
    weight: 1.2
    kpis:
      - name: "种子质量管控"
        direction: "higher_better"
        description: "种子/细胞株的质量合格率"
      - name: "生产异常率"
        direction: "lower_better"
        description: "生产过程中的异常事件频率"

risk_factors:
  - name: "关键工艺失败率上升"
    severity: "high"
    threshold: "一/二级罐培养成功率下降"
  - name: "合规风险"
    severity: "high"
    threshold: "检测结果不合格或放行异常"

analysis_prompt_extension: |
  干细胞研究院遵循"种子/细胞株管理→生产计划与排程→生产过程与质量控制→分析检测与合规放行"的全生命周期管理流程。审核经营分析资料时需特别关注：
  1. **关键工艺成功率**：一/二级罐培养等核心工艺的稳定性
  2. **生产计划达成**：排程执行和交付情况
  3. **检测与合规**：分析检测合格率、放行合规性
  4. **研发里程碑**：各项目的关键节点达成
  5. **BSC挂钩**：指标是否与流程关键控制点紧密挂钩，衡量稳定性、效率与质量

  常见质量问题：
  - 生产数据只有总量，缺乏关键工艺的成功率分析
  - 异常事件只报数量，缺乏根因和改善措施
  - 研发里程碑缺乏详细的节点状态
