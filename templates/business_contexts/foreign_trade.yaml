department: "外贸事业部"
description: "负责集团产品出口、国际市场开拓和跨境贸易的业务部门"
business_thread: "市场开拓→客户开发→订单管理→生产协调→跨境物流→回款结算"

focus_areas:
  - area: "出口业绩"
    weight: 1.5
    kpis:
      - name: "出口销售额"
        direction: "higher_better"
        description: "外贸出口的总销售收入"
      - name: "出口目标达成率"
        direction: "higher_better"
        description: "实际出口额与目标的比率"
      - name: "新市场开拓数"
        direction: "higher_better"
        description: "新进入的国家/地区市场数量"
  - area: "客户管理"
    weight: 1.3
    kpis:
      - name: "新客户开发数"
        direction: "higher_better"
        description: "新开发的海外客户数量"
      - name: "客户留存率"
        direction: "higher_better"
        description: "持续合作的海外客户占比"
      - name: "大客户贡献占比"
        direction: "stable"
        description: "TOP10客户占出口额的比例"
  - area: "订单与交付"
    weight: 1.2
    kpis:
      - name: "订单准时交付率"
        direction: "higher_better"
        description: "按合同约定时间完成交付的比率"
      - name: "回款周期"
        direction: "lower_better"
        description: "从发货到收款的平均周期"
      - name: "汇率损益"
        direction: "stable"
        description: "汇率波动对利润的影响"

risk_factors:
  - name: "大客户流失"
    severity: "high"
    threshold: "TOP5客户流失或订单量大幅下滑"
  - name: "回款风险"
    severity: "high"
    threshold: "逾期应收款占比 > 20%"
  - name: "贸易政策风险"
    severity: "medium"
    threshold: "目标市场出现重大贸易政策变化"

analysis_prompt_extension: |
  外贸事业部的核心业务是集团产品的出口销售和国际市场开拓。审核经营分析资料时需要特别关注：
  1. **市场布局**：出口国家/地区分布、新市场开拓进展、市场多元化程度
  2. **客户结构**：客户集中度、新客户开发效率、大客户维护情况
  3. **订单交付**：从接单到交付的全流程效率、品质问题、物流成本
  4. **汇率与风险**：汇率波动影响、贸易政策风险、信用风险管理
  5. **产品竞争力**：各产品线在不同市场的表现、竞品对比

  常见质量问题：
  - 缺乏分国家/地区的市场分析
  - 客户开发只有数量，缺乏质量（订单量/利润率）分析
  - 未分析汇率波动对利润的实际影响和应对措施
