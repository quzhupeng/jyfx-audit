department: "外贸事业部"
description: "遵循跨境电商核心运营链条，负责选品测款、推广转化与客户复购的业务部门"
business_thread: "选品测款 → 上架推广 → 流量转化 → 订单履约 → 客户复购"

focus_areas:
  - area: "流量效率"
    weight: 1.5
    kpis:
      - name: "平台ROI（投资回报率）"
        direction: "higher_better"
        description: "各平台广告投放的投入产出比"
  - area: "转化效能"
    weight: 1.4
    kpis:
      - name: "询盘/订单转化率"
        direction: "higher_better"
        description: "从询盘到订单的转化效率"
  - area: "供应链敏捷度"
    weight: 1.3
    kpis:
      - name: "库存周转天数"
        direction: "lower_better"
        description: "库存从入库到售出的周转效率"
  - area: "客户价值"
    weight: 1.2
    kpis:
      - name: "客户回购率"
        direction: "higher_better"
        description: "老客户再次下单的比率"

risk_factors:
  - name: "ROI持续下滑"
    severity: "high"
    threshold: "平台ROI环比下降 > 20%"
  - name: "转化率骤降"
    severity: "high"
    threshold: "询盘/订单转化率大幅下降"
  - name: "库存积压"
    severity: "medium"
    threshold: "库存周转天数持续拉长"

analysis_prompt_extension: |
  外贸事业部遵循跨境电商核心运营链条。审核经营分析资料时需特别关注：
  1. **流量效率**：各平台的投放ROI、获客成本趋势
  2. **转化效能**：询盘到订单的转化率及影响因素
  3. **供应链敏捷度**：库存周转、履约时效、物流成本
  4. **客户价值**：回购率、客户生命周期价值
  5. **BSC对齐**：是否紧扣流量效率、转化效能、供应链敏捷度、客户价值四大生死线

  常见质量问题：
  - 缺乏分平台的ROI对比分析
  - 只看询盘量不看转化链路
  - 未分析库存周转和供应链效率
