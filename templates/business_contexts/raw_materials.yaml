department: "原材料事业部"
description: "负责原材料采购、仓储、加工与供应保障的业务部门"
business_thread: "供应商开发→原料采购→品质检验→仓储管理→加工配送→成本优化"

focus_areas:
  - area: "采购与成本"
    weight: 1.5
    kpis:
      - name: "采购成本节约率"
        direction: "higher_better"
        description: "实际采购成本低于预算的节约比率"
      - name: "供应商开发数"
        direction: "higher_better"
        description: "新开发的合格供应商数量"
      - name: "采购及时率"
        direction: "higher_better"
        description: "按时完成采购订单的比率"
  - area: "品质管理"
    weight: 1.3
    kpis:
      - name: "来料合格率"
        direction: "higher_better"
        description: "通过品质检验的原材料批次占比"
      - name: "供应商评级分布"
        direction: "higher_better"
        description: "A/B/C级供应商的分布情况"
  - area: "仓储与配送"
    weight: 1.2
    kpis:
      - name: "库存周转率"
        direction: "higher_better"
        description: "原材料库存的周转效率"
      - name: "配送及时率"
        direction: "higher_better"
        description: "按时完成内部配送的比率"
      - name: "损耗率"
        direction: "lower_better"
        description: "仓储和配送过程中的物料损耗比率"

risk_factors:
  - name: "原料价格大幅波动"
    severity: "high"
    threshold: "核心原料价格环比波动 > 15%"
  - name: "供应商集中风险"
    severity: "medium"
    threshold: "单一供应商占比 > 60%"
  - name: "库存积压"
    severity: "medium"
    threshold: "超期库存占比 > 20%"

analysis_prompt_extension: |
  原材料事业部的核心业务是保障集团原材料供应的质量、成本和时效。审核经营分析资料时需要特别关注：
  1. **采购策略**：供应商多元化、采购成本趋势、议价能力变化
  2. **品质管控**：来料合格率变化趋势、不合格品的处理方式
  3. **库存管理**：库存周转效率、积压和损耗情况、安全库存策略
  4. **成本分析**：采购成本构成、降本措施效果、价格波动应对
  5. **供应链韧性**：备选供应商、应急预案、供应链风险点

  常见质量问题：
  - 采购成本分析缺乏与市场价格的对比
  - 供应商管理只有数量，缺乏绩效分级和优化措施
  - 库存数据未做ABC分类和周转率分析
