department: "原材料事业部"
description: "以大客户战略为核心，实现B端商业模式突破的业务部门"
business_thread: "明确大客户战略 → 集中资源攻坚标杆客户（品牌背书）→ 驱动B端持续采购 → 技术优势转市场壁垒 → 复制成功模式"

focus_areas:
  - area: "大客户攻坚"
    weight: 1.5
    kpis:
      - name: "标杆客户突破"
        direction: "higher_better"
        description: "成功签约/合作的标杆大客户数量"
      - name: "客户阶段分布"
        direction: "higher_better"
        description: "测试/中试/商务谈判各阶段的客户数"
      - name: "B端持续采购额"
        direction: "higher_better"
        description: "B端客户的持续采购金额"
  - area: "客户漏斗与转化"
    weight: 1.4
    kpis:
      - name: "漏斗转化率"
        direction: "higher_better"
        description: "从测试到成交各阶段的转化率"
      - name: "未成交根因分析"
        direction: "higher_better"
        description: "测试未成交客户的根因分析覆盖率"
  - area: "技术与协同"
    weight: 1.2
    kpis:
      - name: "销售与研发协同"
        direction: "higher_better"
        description: "重点客户跟进中销售与研发的协同效率"

risk_factors:
  - name: "标杆客户攻坚失败"
    severity: "high"
    threshold: "核心标杆客户流失或谈判停滞"
  - name: "漏斗断裂"
    severity: "high"
    threshold: "大量测试客户无转化且无根因分析"
  - name: "资源分散"
    severity: "medium"
    threshold: "业务力量未聚焦高价值大客户"

analysis_prompt_extension: |
  原材料事业部的核心是B端大客户战略的从零到一突破。审核经营分析资料时需特别关注：
  1. **大客户聚焦**：业务力量是否真正聚焦于高价值大客户？是否集中资源打造标杆样板？
  2. **客户阶段**：重点客户当前所处阶段（测试、中试、商务谈判）、预计成交时间
  3. **内部资源调动**：为攻克大客户调动的研发、高层支持等资源是否到位
  4. **漏斗分析**：大量进入测试但未成交的客户，是否有清晰的根因分析？转化卡点在哪里？
  5. **协同效率**：销售与研发/技术的协同是否顺畅
  6. **模式复制**：标杆成功后是否有可复制的模式

  常见质量问题：
  - 缺乏客户漏斗的阶段数据和转化分析
  - 未成交客户只说数量不说原因
  - 未分析销售与研发协同中的问题
