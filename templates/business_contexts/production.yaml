department: "生产中心"
description: "遵循ISC集成供应链链条，负责生产制造、成本控制与质量交付的运营部门"
business_thread: "生产计划与排程 → 生产过程与成本控制 → 质量与交付管理 → 库存与供应链协同（ISC链条）"

focus_areas:
  - area: "成本"
    weight: 1.5
    kpis:
      - name: "生产成本控制率（对标外部OEM）"
        direction: "higher_better"
        description: "自产成本与外部OEM成本的对比，一号指标"
  - area: "效率"
    weight: 1.4
    kpis:
      - name: "生产计划达成率"
        direction: "higher_better"
        description: "按计划完成生产任务的比率"
  - area: "质量"
    weight: 1.3
    kpis:
      - name: "成品一次交检合格率"
        direction: "higher_better"
        description: "产品首次检验合格的比率"
  - area: "资产健康度"
    weight: 1.2
    kpis:
      - name: "库存周转天数/金额"
        direction: "lower_better"
        description: "成品库存的周转效率和金额"

risk_factors:
  - name: "成本失控"
    severity: "high"
    threshold: "生产成本高于外部OEM对标"
  - name: "计划达成率低"
    severity: "high"
    threshold: "生产计划达成率 < 85%"
  - name: "品质异常"
    severity: "high"
    threshold: "一次交检合格率大幅下降"

analysis_prompt_extension: |
  生产中心遵循ISC集成供应链链条。审核经营分析资料时需特别关注：
  1. **生产成本控制率**：今年绝对的"一号指标"，自产vs外部OEM的成本对比
  2. **生产计划达成率**：排程执行和交付效率
  3. **成品一次交检合格率**：质量管控水平
  4. **库存周转**：成品库存健康度和供应链协同效率
  5. **BSC对齐**：是否紧密围绕"成本"、"效率"、"质量"、"资产健康度"四大制造核心命题

  常见质量问题：
  - 缺乏与外部OEM的成本对比分析
  - 成本分析只看总额，缺乏各环节拆解
  - 库存数据未做结构和周转分析
