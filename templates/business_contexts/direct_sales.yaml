department: "直销事业部"
description: "通过团队主动获客与转化，实现产品销售的业务部门"
business_thread: "获客引流→客户跟进→需求挖掘→产品匹配→成交转化→售后维护→复购裂变"

focus_areas:
  - area: "销售业绩"
    weight: 1.5
    kpis:
      - name: "销售目标达成率"
        direction: "higher_better"
        description: "实际销售额与目标的比率"
      - name: "人均销售额"
        direction: "higher_better"
        description: "每位销售人员的平均销售额"
      - name: "新客户成交数"
        direction: "higher_better"
        description: "新获客并成交的客户数量"
  - area: "获客与转化"
    weight: 1.3
    kpis:
      - name: "线索转化率"
        direction: "higher_better"
        description: "有效线索到成单的转化率"
      - name: "获客成本"
        direction: "lower_better"
        description: "获取单个新客户的平均成本"
      - name: "客户复购率"
        direction: "higher_better"
        description: "已成交客户的再次购买比率"
  - area: "团队效能"
    weight: 1.0
    kpis:
      - name: "人员流失率"
        direction: "lower_better"
        description: "一定周期内销售人员离职占比"
      - name: "人均拜访量"
        direction: "higher_better"
        description: "每位销售人员的日均客户拜访/触达量"

risk_factors:
  - name: "业绩过度集中"
    severity: "high"
    threshold: "TOP3销售人员贡献 > 50%业绩"
  - name: "新客获取乏力"
    severity: "high"
    threshold: "连续2月新客数下降"
  - name: "转化率下滑"
    severity: "medium"
    threshold: "线索转化率环比下降 > 15%"
  - name: "团队不稳定"
    severity: "medium"
    threshold: "月流失率 > 10%"

analysis_prompt_extension: |
  直销事业部的核心业务是团队主动获客与转化。审核经营分析资料时需要特别关注：
  1. **获客到转化的完整链路数据**：从线索获取、跟进、需求挖掘到成交各环节的转化率
  2. **团队人效分析**：人员间的横向对比，标杆与尾部的差距及原因
  3. **客户价值深度**：复购率、客单价变化、客户生命周期价值
  4. **根因追踪**：业绩波动是否追溯到具体环节（获客/跟进/转化/复购）
  5. **改善措施可执行性**：是否有具体时间节点、责任人、量化目标

  常见质量问题：
  - 只有业绩总量，缺乏获客-转化漏斗的过程数据
  - 根因停留在"市场不好"等表面原因，未追溯到可操作层面
  - 改善措施空泛，无具体执行方案
