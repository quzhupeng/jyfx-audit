department: "直销事业部"
description: "通过团队主动获客与转化，实现产品销售的业务部门"
business_thread: "团队主动获客与转化（进人量-经营率）→ 客户深挖（升单率）→ 区域均衡增长（大小区平衡）→ 供应链与产品支持保障"

focus_areas:
  - area: "获客与转化"
    weight: 1.5
    kpis:
      - name: "进人量（新会员新增）"
        direction: "higher_better"
        description: "新增会员数量"
      - name: "经营率"
        direction: "higher_better"
        description: "新会员的生存/活跃情况"
      - name: "升单率"
        direction: "higher_better"
        description: "普卡进入后升级单的比例"
  - area: "区域均衡增长"
    weight: 1.3
    kpis:
      - name: "大小区平衡"
        direction: "stable"
        description: "大区与小区之间的业绩均衡度"
      - name: "区域达成率"
        direction: "higher_better"
        description: "各区域销售目标达成情况"
  - area: "BSC综合"
    weight: 1.2
    kpis:
      - name: "销售目标达成率"
        direction: "higher_better"
        description: "实际销售额与目标的比率"

risk_factors:
  - name: "进人量持续下滑"
    severity: "high"
    threshold: "连续2月新会员新增下降"
  - name: "经营率偏低"
    severity: "high"
    threshold: "新会员经营率 < 目标值"
  - name: "区域严重失衡"
    severity: "medium"
    threshold: "大小区业绩偏差过大"

analysis_prompt_extension: |
  直销事业部核心业务是团队主动获客与转化。审核经营分析资料时需特别关注：
  1. **进人量-经营率链条**：新会员获取数量及后续生存/活跃情况是否清晰呈现
  2. **升单率**：普卡到升级单的转化数据及根因分析
  3. **大小区平衡**：区域间业绩是否均衡，是否有明确的均衡增长措施
  4. **BSC覆盖**：前端获客、转化效率、区域经营均衡是否全面覆盖
  5. **供应链保障**：产品支持是否能支撑前端销售

  常见质量问题：
  - 只有销售总量，缺乏进人量-经营率-升单率的链路数据
  - 未分析大小区失衡的根因和改善措施
  - 改善措施空泛，无具体执行方案
