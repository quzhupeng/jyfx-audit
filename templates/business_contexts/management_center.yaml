department: "管理中心"
description: "负责人力资源、行政后勤、IT支撑等综合管理服务的职能部门"
business_thread: "制度规划→组织建设→人才管理→效能提升→成本管控→服务保障"

focus_areas:
  - area: "人力管理"
    weight: 1.4
    kpis:
      - name: "人员编制执行率"
        direction: "stable"
        description: "实际在岗人数与编制的比率"
      - name: "招聘达成率"
        direction: "higher_better"
        description: "各岗位招聘需求按时完成的比率"
      - name: "核心人才留存率"
        direction: "higher_better"
        description: "核心岗位人员的留存比率"
  - area: "行政运营"
    weight: 1.2
    kpis:
      - name: "行政费用预算执行率"
        direction: "stable"
        description: "行政类费用的预算vs实际执行情况"
      - name: "员工满意度"
        direction: "higher_better"
        description: "员工对行政服务的满意度评分"
  - area: "IT支撑"
    weight: 1.1
    kpis:
      - name: "系统可用率"
        direction: "higher_better"
        description: "核心IT系统的正常运行时间占比"
      - name: "需求响应时长"
        direction: "lower_better"
        description: "处理各业务线IT需求的平均时长"

risk_factors:
  - name: "核心人才流失"
    severity: "high"
    threshold: "核心岗位月流失率 > 5%"
  - name: "编制严重偏离"
    severity: "medium"
    threshold: "编制执行偏差 > 20%"
  - name: "行政费用超标"
    severity: "medium"
    threshold: "行政费用超预算 > 15%"

analysis_prompt_extension: |
  管理中心的核心职能是为集团提供人力资源、行政和IT等综合管理支撑。审核经营分析资料时需要特别关注：
  1. **人力规划与执行**：编制管理、招聘进度、人才梯队建设
  2. **组织效能**：人均产出、组织效率指标、部门间协同效率
  3. **费用管控**：行政费用、人力成本的预算执行和优化措施
  4. **服务品质**：内部客户（各事业部）的服务满意度
  5. **制度完善**：管理制度的更新和执行情况

  常见质量问题：
  - 人力数据只有总量，缺乏结构分析（岗位/层级/事业部分布）
  - 招聘只报数据未分析难点和改善方案
  - 缺乏对其他事业部支撑效果的评价
