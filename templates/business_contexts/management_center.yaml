department: "管理中心"
description: "负责战略拆解、组织人才、流程机制和数字化管理的综合职能部门"
business_thread: "战略拆解 → 组织/人才承接 → 流程/机制落地 → 数字化固化 → 成本效率验证 → 经营分析改善 → 回到战略调整"

focus_areas:
  - area: "战略落地"
    weight: 1.5
    kpis:
      - name: "战略拆解完成度"
        direction: "higher_better"
        description: "集团战略到各部门目标的分解覆盖率"
      - name: "流程/机制落地"
        direction: "higher_better"
        description: "新建或优化的管理制度/流程数量"
      - name: "数字化固化率"
        direction: "higher_better"
        description: "核心流程数字化覆盖程度"
  - area: "组织与人才"
    weight: 1.3
    kpis:
      - name: "人才承接度"
        direction: "higher_better"
        description: "关键岗位人才到位率和胜任力"
      - name: "招聘达成率"
        direction: "higher_better"
        description: "各岗位招聘需求的按时完成率"
  - area: "赋能与增效"
    weight: 1.4
    kpis:
      - name: "降本增效贡献"
        direction: "higher_better"
        description: "各项工作对降本增效的贡献量化"
      - name: "业务前台协同度"
        direction: "higher_better"
        description: "与业务前线的高效协同合力"

risk_factors:
  - name: "被动等待"
    severity: "high"
    threshold: "职能部门未主动管理与建立规则"
  - name: "缺乏体系化"
    severity: "medium"
    threshold: "解决问题靠临时措施，未建长效机制"

analysis_prompt_extension: |
  管理中心的核心是战略拆解到执行闭环的全链路管理。审核经营分析资料时需特别关注：
  1. **主动管理**：职能部门是否主动管理与建立规则，避免被动等待
  2. **体系化方法**：是否用体系化方法解决问题，注重长效机制建设
  3. **深度赋能**：作为后台是否为业务前台深度赋能，与业务前线形成高效协同合力
  4. **降本增效**：各项工作是否贡献于降本、增效等核心经营指标
  5. **闭环管理**：从战略拆解到经营分析改善再到战略调整，闭环是否完整

  常见质量问题：
  - 工作汇报流于事务罗列，缺乏与战略目标的关联
  - 未体现对业务前线的赋能效果
  - 缺乏量化数据支撑降本增效成果
