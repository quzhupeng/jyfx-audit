department: "财务部"
description: "负责集团财务管理、资金运作、成本控制及经营分析的职能部门"
business_thread: "业财融合与精益财务，支撑集团战略落地，保障经营健康与价值增长"

focus_areas:
  - area: "经营利润"
    weight: 1.5
    kpis:
      - name: "集团收入总额"
        direction: "higher_better"
        description: "集团整体营业收入"
      - name: "集团经营利润完成率"
        direction: "higher_better"
        description: "实际经营利润与目标的比率"
  - area: "财务管控"
    weight: 1.3
    kpis:
      - name: "财务核算准确率"
        direction: "higher_better"
        description: "财务核算的准确程度"
      - name: "生产成本控制率"
        direction: "higher_better"
        description: "生产成本的管控效果"
      - name: "资产周转率"
        direction: "higher_better"
        description: "资产使用效率"
  - area: "业财融合"
    weight: 1.2
    kpis:
      - name: "财务对业务的赋能效果"
        direction: "higher_better"
        description: "财务对业务决策的支撑深度"

risk_factors:
  - name: "利润未达标"
    severity: "high"
    threshold: "经营利润完成率 < 90%"
  - name: "成本失控"
    severity: "high"
    threshold: "生产成本控制率大幅偏离"

analysis_prompt_extension: |
  财务部的核心是通过业财融合与精益财务支撑集团战略落地。审核经营分析资料时需特别关注：
  1. **集团经营大盘**：收入总额、经营利润完成率的趋势和差异分析
  2. **成本管控**：生产成本控制率的达成情况及偏差分析
  3. **业财融合深度**：财务对业务前线的赋能效果，是否有具体的经营洞察和建议
  4. **财务风险防控**：现金流、应收账款、资产周转等风险指标
  5. **BSC对齐**：核心驱动力指标是否全面覆盖

  常见质量问题：
  - 只有数据罗列，缺乏预算-实际的差异分析和根因
  - 缺乏对各事业部经营数据的深度洞察
  - 未体现财务对业务的赋能和价值增值
