department: "数字营销"
description: "通过新媒体、直播、达人运营、内容IP等手段为各事业部赋能的业务部门"
business_thread: "公域引流（新媒体/直播/达人）→ 私域沉淀 → 销售转化 → 流量变现与业务赋能"

focus_areas:
  - area: "流量变现"
    weight: 1.5
    kpis:
      - name: "收入"
        direction: "higher_better"
        description: "数字营销渠道产生的收入"
      - name: "净利润额"
        direction: "higher_better"
        description: "扣除费用后的净利润"
  - area: "业务赋能"
    weight: 1.4
    kpis:
      - name: "核销业绩"
        direction: "higher_better"
        description: "线上引流到线下核销的业绩"
      - name: "核销人次"
        direction: "higher_better"
        description: "线上引流到线下核销的人次"
  - area: "用户沉淀"
    weight: 1.2
    kpis:
      - name: "商城活跃用户"
        direction: "higher_better"
        description: "线上商城的活跃用户数"

risk_factors:
  - name: "投入产出失衡"
    severity: "high"
    threshold: "净利润持续为负或下降"
  - name: "赋能效果弱"
    severity: "medium"
    threshold: "核销业绩占比持续走低"

analysis_prompt_extension: |
  数字营销的核心价值是通过新媒体、直播、达人运营、内容IP等手段为各事业部赋能。审核经营分析资料时需特别关注：
  1. **流量变现效率**：各渠道投入与产出的ROI分析
  2. **业务赋能效果**：为直销、美业等事业部带来的核销业绩和引流效果
  3. **用户沉淀**：公域引流到私域的转化、商城活跃度
  4. **BSC覆盖**：流量变现、业务赋能效果、用户沉淀是否全面覆盖

  常见质量问题：
  - 只有投放数据，缺乏对各事业部的实际赋能效果分析
  - 收入与费用未做匹配分析，看不出盈利能力
  - 缺乏用户从公域到私域到成交的链路数据
