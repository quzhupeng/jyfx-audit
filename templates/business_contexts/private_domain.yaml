department: "私域事业部"
description: "聚焦To B精细化运营，以私域直播为主力，构建多渠道协同的B端盈利模式"
business_thread: "To B精细化运营 → 私域直播（主力获取现金流）→ 补齐团购与商超 → 拉升品牌价格带 → 多渠道协同、摆脱白牌"

focus_areas:
  - area: "三驾马车"
    weight: 1.5
    kpis:
      - name: "私域直播业绩"
        direction: "higher_better"
        description: "私域直播产生的现金流和业绩"
      - name: "团购渠道进展"
        direction: "higher_better"
        description: "私域团购渠道的拓展和业绩"
      - name: "商超渠道进展"
        direction: "higher_better"
        description: "商超渠道的拓展和业绩"
  - area: "渠道结构"
    weight: 1.3
    kpis:
      - name: "渠道结构均衡度"
        direction: "stable"
        description: "三条业务线的营收占比和推进节奏"
      - name: "库存健康度"
        direction: "higher_better"
        description: "库存周转和积压情况"
      - name: "物流成本"
        direction: "lower_better"
        description: "物流配送成本"
  - area: "费用与利润"
    weight: 1.4
    kpis:
      - name: "投产比"
        direction: "higher_better"
        description: "费用投入的有效性和产出比"
      - name: "收入与成本匹配"
        direction: "stable"
        description: "收入增长与成本增长的匹配度"

risk_factors:
  - name: "三驾马车失衡"
    severity: "high"
    threshold: "私域直播占比过高，团购/商超未推进"
  - name: "费用投入低效"
    severity: "high"
    threshold: "投产比持续下降"
  - name: "品牌建设停滞"
    severity: "medium"
    threshold: "仍停留在白牌状态"

analysis_prompt_extension: |
  私域事业部聚焦To B精细化运营，以私域直播为当前主力。审核经营分析资料时需特别关注：
  1. **三驾马车节奏**：私域直播、团购、商超三条线推进是否正常？是否有短板？短板是否有明确补齐措施？
  2. **费用投入有效性**：带来更多收入的费用是否有必要？投产比如何？
  3. **收入与成本**：收入与成本是否合理匹配？渠道结构拓展是否顺利？
  4. **库存与物流**：库存是否健康？物流成本是否在降低？
  5. **品牌升级**：是否在拉升品牌价格带和技术高度，摆脱白牌印象？

  常见质量问题：
  - 三条业务线只报数据，未分析节奏和短板
  - 费用分析只有总额，缺乏投产比
  - 缺乏品牌建设和多渠道协同的战略性分析
