department: "私域事业部"
description: "私域事业部负责私域流量运营和用户资产管理，通过微信生态、企业微信、社群等渠道进行用户沉淀、激活和变现。"

focus_areas:
  - area: "用户增长"
    weight: 1.5
    kpis:
      - name: "私域用户总量"
        direction: "higher_better"
      - name: "新增用户数"
        direction: "higher_better"
      - name: "用户留存率"
        direction: "higher_better"
      - name: "引流成本"
        direction: "lower_better"
  - area: "用户运营"
    weight: 1.3
    kpis:
      - name: "社群活跃度"
        direction: "higher_better"
      - name: "内容互动率"
        direction: "higher_better"
      - name: "用户LTV"
        direction: "higher_better"
  - area: "商业变现"
    weight: 1.2
    kpis:
      - name: "GMV"
        direction: "higher_better"
      - name: "转化率"
        direction: "higher_better"
      - name: "复购率"
        direction: "higher_better"
      - name: "ARPU值"
        direction: "higher_better"

terminology:
  - "私域"
  - "社群"
  - "企业微信"
  - "个人号"
  - "朋友圈"
  - "SCRM"
  - "MA"
  - "标签"
  - "分层"
  - "激活"
  - "裂变"
  - "CDP"

content_expectations:
  - "用户分层数据（新用户/活跃用户/沉睡用户/流失用户）"
  - "各触达渠道的效果对比（企微/社群/朋友圈/公众号/小程序）"
  - "内容策略与互动数据"
  - "用户LTV与CAC的对比分析"
  - "裂变活动效果归因"
  - "标签体系覆盖率和准确率"

risk_factors:
  - name: "用户流失加速"
    severity: "high"
    threshold: "月度流失率 > 5%"
    description: "私域用户流失意味着资产缩水，需分析流失原因"
  - name: "变现效率下降"
    severity: "high"
    threshold: "GMV环比下降或ARPU值下降"
    description: "用户增长但变现效率下降说明运营策略有问题"
  - name: "平台政策风险"
    severity: "medium"
    threshold: "微信生态政策变化"
    description: "依赖微信生态，政策变动可能影响触达效率"
  - name: "内容合规风险"
    severity: "low"
    threshold: "被用户投诉/平台警告"
    description: "过度营销可能导致用户反感或被平台限流"

analysis_prompt_extension: |
  ## 私域事业部背景

  私域事业部的核心是用户资产管理和精细化运营。审核经营分析资料时，需重点关注：

  1. **用户分层**：是否按照活跃度、消费能力、生命周期阶段进行分层分析
  2. **增长质量**：新增用户是否精准，留存情况如何
  3. **运营效率**：各触达渠道的打开率、互动率、转化率
  4. **变现逻辑**：GMV的来源分解（首购/复购/裂变）
  5. **技术工具**：SCRM/CDP/MA等工具的覆盖和使用情况

  常见质量问题：
  - 只关注用户总量增长，忽略留存和活跃度
  - GMV分析缺少用户维度拆解
  - 内容运营缺乏数据支撑，只看发布量不看效果
  - 标签体系不完善导致运营策略粗放
