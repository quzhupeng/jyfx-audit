department: "私域事业部"
description: "通过微信、社群、小程序等私域渠道进行客户运营与销售转化的业务部门"
business_thread: "引流建池→客户分层→内容触达→社群运营→精准转化→复购裂变"

focus_areas:
  - area: "私域规模"
    weight: 1.4
    kpis:
      - name: "私域用户总量"
        direction: "higher_better"
        description: "企微/个人号/社群中的总用户数"
      - name: "日新增用户数"
        direction: "higher_better"
        description: "每日新增的私域用户数"
      - name: "用户活跃率"
        direction: "higher_better"
        description: "有互动行为的活跃用户占比"
  - area: "转化与销售"
    weight: 1.5
    kpis:
      - name: "私域GMV"
        direction: "higher_better"
        description: "私域渠道产生的总交易额"
      - name: "转化率"
        direction: "higher_better"
        description: "私域用户到下单的转化率"
      - name: "客单价"
        direction: "higher_better"
        description: "私域渠道的平均订单金额"
  - area: "客户运营"
    weight: 1.2
    kpis:
      - name: "复购率"
        direction: "higher_better"
        description: "私域用户的重复购买率"
      - name: "裂变系数"
        direction: "higher_better"
        description: "每个用户平均带来的新用户数"
      - name: "用户流失率"
        direction: "lower_better"
        description: "取关/删除/退群的私域用户比率"

risk_factors:
  - name: "用户增长停滞"
    severity: "high"
    threshold: "连续2月日新增用户数下降"
  - name: "转化率下滑"
    severity: "high"
    threshold: "私域转化率环比下降 > 15%"
  - name: "用户流失加速"
    severity: "medium"
    threshold: "月流失率 > 8%"

analysis_prompt_extension: |
  私域事业部的核心业务是通过私域渠道实现客户精细化运营和销售转化。审核经营分析资料时需要特别关注：
  1. **用户增长与留存**：新增来源分析、用户活跃度变化、流失原因
  2. **分层运营效果**：不同用户层级（新客/活跃/沉睡/VIP）的运营策略和转化差异
  3. **内容与活动**：触达频率、内容形式效果对比、活动ROI
  4. **销售转化路径**：从触达到成交的完整链路分析
  5. **裂变与口碑**：老带新效果、用户推荐率

  常见质量问题：
  - 只有用户总量数据，缺乏新增-活跃-留存-转化的完整链路
  - 缺乏用户分层分析和差异化运营策略
  - 活动效果只有GMV，缺乏ROI和用户质量分析
