department: "研发中心"
description: "遵循IPD全流程，负责技术预研、产品开发与成果转化的技术部门"
business_thread: "技术预研 → 项目立项 → 开发验证 → 成果转化/上市（IPD全流程）"

focus_areas:
  - area: "研发投产"
    weight: 1.5
    kpis:
      - name: "研发投产比"
        direction: "higher_better"
        description: "研发投入的投资回报率"
      - name: "研发费用预算达成率"
        direction: "stable"
        description: "研发费用实际vs预算"
  - area: "产品上市"
    weight: 1.4
    kpis:
      - name: "新产品上市及时率"
        direction: "higher_better"
        description: "按计划节点完成产品上市的比率"
      - name: "上市节点达成"
        direction: "higher_better"
        description: "IPD流程关键产出节点的达成情况"
  - area: "技术成果"
    weight: 1.3
    kpis:
      - name: "核心技术成果（专利/查新）数量"
        direction: "higher_better"
        description: "专利申请/授权和查新报告数量"
      - name: "技术储备"
        direction: "higher_better"
        description: "前瞻性技术研究和储备项目"

risk_factors:
  - name: "研发投产比持续走低"
    severity: "high"
    threshold: "研发投入产出不匹配"
  - name: "产品上市严重延迟"
    severity: "high"
    threshold: "核心项目延期 > 1个月"

analysis_prompt_extension: |
  研发中心遵循IPD全流程进行技术预研和产品开发。审核经营分析资料时需特别关注：
  1. **研发投产比**：研发投入是否产生了对等的商业回报
  2. **新产品上市及时率**：各项目是否按IPD流程节点推进
  3. **核心技术成果**：专利/查新等硬性产出指标
  4. **预算管控**：研发费用预算与实际的偏差分析
  5. **BSC对齐**：指标是否与IPD流程关键产出节点紧密对齐，衡量价值创造与效率

  常见质量问题：
  - 研发进展只报概况，缺乏各IPD节点的详细状态
  - 延期项目只说原因不提改善措施
  - 缺乏研发投产比的量化分析
