department: "研发中心"
description: "负责新产品研发、技术创新和产品迭代升级的技术部门"
business_thread: "需求洞察→立项评估→研发攻关→测试验证→产品发布→迭代优化"

focus_areas:
  - area: "研发产出"
    weight: 1.5
    kpis:
      - name: "新品上市数量"
        direction: "higher_better"
        description: "按计划完成研发并上市的新产品数量"
      - name: "研发项目完成率"
        direction: "higher_better"
        description: "按计划节点完成研发项目的比率"
      - name: "研发周期"
        direction: "lower_better"
        description: "从立项到产品上市的平均周期"
  - area: "研发质量"
    weight: 1.3
    kpis:
      - name: "一次通过率"
        direction: "higher_better"
        description: "产品测试一次通过的比率"
      - name: "上市后问题率"
        direction: "lower_better"
        description: "新品上市后发现的品质问题数"
  - area: "创新与专利"
    weight: 1.2
    kpis:
      - name: "专利申请/授权数"
        direction: "higher_better"
        description: "新申请和获得的专利数量"
      - name: "技术成果转化率"
        direction: "higher_better"
        description: "研发成果成功转化为产品的比率"

risk_factors:
  - name: "研发进度延迟"
    severity: "high"
    threshold: "核心项目延期 > 1个月"
  - name: "上市产品品质问题"
    severity: "high"
    threshold: "新品上市后重大品质问题"
  - name: "技术人才流失"
    severity: "medium"
    threshold: "核心研发人员流失率 > 10%"

analysis_prompt_extension: |
  研发中心的核心职能是新产品研发和技术创新。审核经营分析资料时需要特别关注：
  1. **项目进度管理**：各研发项目的里程碑达成、延期原因分析
  2. **研发质量**：测试结果、品质问题追踪、改进措施
  3. **市场导向**：研发立项是否有市场调研支撑，新品市场反馈如何
  4. **资源效率**：研发投入（人力、资金）与产出的匹配度
  5. **技术储备**：前瞻性技术研究和专利布局

  常见质量问题：
  - 研发进度只有总体概况，缺乏各项目的详细状态
  - 延期项目只说原因不提改善措施和新的时间节点
  - 缺乏新品上市后的市场表现追踪
